# Банк вопросов и категории для опросника собеседований.
# Файл редактируется руками; build.py собирает из него index.html.
#
# categories — технологии по группам важности:
#   CORE — обязательно для всех инженеров; MEDIUM — желательно; SPECIFIC — под конкретный проект.
categories:
  CORE: [Linux, Helm, Ansible, Kubernetes, Docker, CI/CD, Postgresql, ELK, Virtualization, Nginx, Git]
  MEDIUM: [Networking, Terraform, S3, Kafka, Rabbitmq, Consul, Cloud, Redis, Sentry, Artifactory, Victoriametrics, Gitlab]
  SPECIFIC: [Allure, Service Mesh, Keycloak, Openshift, Windows, Packer, Hashicorp Vault, Clickhouse, Ignite, Cassandra, Jenkins]

# questions — банк вопросов. Ключ = категория (должна присутствовать в categories выше).
#   level: Low | Medium | High
#   q:     текст вопроса
#   keys:  ключевые точки — подсказки интервьюеру (0–3 шт.)
questions:
  Linux:
  - level: Low
    q: Что такое systemd и зачем он нужен
    keys:
    - знает что systemd это подсистема инициализации и управления службами
    - знает про service, timer, socket, ...
    - знает про systemd-(networkd, resolved, timesyncd, journald, ...)
  - level: Low
    q: Какие права на файл бывают
    keys:
    - знает про RWX
    - знает про группу, пользователя, остальных
    - может привести примеры
  - level: Medium
    q: Как посмотреть доступные системе ресурсы ЦПУ ОЗУ / Как оценить утилизацию ресурсов
    keys:
    - знает что вся информация хранится в /proc
    - рассказывает про top, htop, atop, free -m, df -h
    - знает почему LA не показателен
  - level: Medium
    q: что такое systemd unit и его структура для сервиса
    keys:
    - знает про блоки unit, service, install
    - знает про execstart-stop, requires-after
    - знает про environment, что такое "-" после =
  - level: Medium
    q: опиши порядок загрузки linux
    keys:
    - знает про GRUB
    - знает про initrd
    - знает про init и systemd
  - level: Medium
    q: Что такое lvm / привести пример как настроить
    keys:
    - знает про pvs, lvs, vgs
    - знает что с помощью lvm можно растянуть том на несколько дисков
    - может описать процесс добавления места в логический том
  - level: Medium
    q: опиши процесс добавления места на жесткий диск для виртуальной машины
    keys:
    - знает про то как добавить диск на лету
    - знает как пересоздать раздел к которому добавляем место
    - знает про resize2fs
  - level: Medium
    q: 'задача: есть отдельно смонтированный раздел /var/log, на котором всего 1 файл = 1Gb, df говорит всё занято / почему'
    keys:
    - знает про inodes
    - знает про то, что процесс может держать файл
    - знает хотя бы один способ как отпустить файл
  - level: Medium
    q: какие сигналы можно слать процессам / отличие SIGKILL / SIGTERM
    keys:
    - знает, что существует 15 сигналов
    - может привести примеры сигналов помимо килл и терм
    - знает чем отличется килл от терм
  - level: High
    q: как работают системы типа cloud init / ignition / kickstart
    keys:
    - знает про то как сформировать конфигурационный файл и что вообще можно настроить
    - знает когда и в какой момент что cloud-init может сделать
    - может привести примеры что он настраивал через этот механизм
  - level: High
    q: контекстное переключение / системные вызовы / организация памяти процесса / планировщик задач
    keys:
    - знает про контекстное переключение, планировщик
    - знает что такое syscall, что при старте системы создается таблица с адресами этих сисколов
    - знает про организацию памяти процесса, TLB
  - level: High
    q: нужно ли перезагружать ОС после обновления / в каких случаях и как можно этого избежать / как минимизировать простой
    keys:
    - знает про /run/reboot-required
    - знает что можно посмотреть lsof для списка удаленных файлов
    - знает что существуют механизмы, как у nginx, для подмены бинарника
  Helm:
  - level: Low
    q: структура helm пакета
    keys:
    - знает про helpers.tpl
    - знает про values, templates
    - знает про chart.yml
  - level: Medium
    q: как откатить плохой релиз
    keys:
    - знает про миграции или иные проблемы
    - знает про роллбек и может описать процесс отката
    - знает где хранятся данные "релиза"
  - level: Medium
    q: как связываются друг с другом манифесты
    keys:
    - знает про selector, labels
    - знает про metadata.labels && spec.template.metadata.labels
    - рассказывает про структуру переменных, helpers.tpl
  - level: Medium
    q: как перезапускать поды при изменении конфигурации
    keys:
    - знает про watchdog'и
    - предполагает, что процесс может сам перечитывать раз в минуту
    - предлагает вариант с хеш суммой конфигмапа
  - level: High
    q: Chart Hooks / Debugging Templates
    keys: []
  - level: High
    q: helmfile / helm-secrets
    keys: []
  Ansible:
  - level: Low
    q: Какие виды переменных существуют и их приоритеты
    keys:
    - знает про extra vars, set_fact
    - group_vars, host_vars, all
    - переменные в роли, в таске, в плее
  - level: Medium
    q: структура ансибл роли
    keys:
    - tasks, handlers, templates, files, defaults, vars
    - meta
    - library, lookup_plugins, module_utils
  - level: Medium
    q: как в ansible описать 3 разных кластера etcd / как будет выглядеть структура плейбука
    keys:
    - предлагает использовать роль
    - рассказывает, что разделил бы сервера в инвентаре на группы
    - создаем group_vars, host_vars, all
  - level: High
    q: писал ли свои фильтры или модули для Ansible на python
    keys:
    - знает про структуру модуля
    - знает зачем нужны фильтры
    - может привести примеры какие задачи решал
  Kubernetes:
  - level: Low
    q: из каких компонент состоит кластер k8s
    keys:
    - апи, шедулер, итп
    - кубелет, кубепрокси
    - CNI
  - level: Medium
    q: какую роль выполняет Api Server / где хранит данные
    keys:
    - знает что это входящая точка для всех запросов и получения информации
    - знает что хранится в етцд
    - может рассказать как сделать отказоустойчивый кластер
  - level: Low
    q: какой тип деплоя нужно использовать чтобы развернуться на всех нодах кластера
    keys:
    - знает про демонсет
    - может привести примеры что через него можно разворачивать
    - а что если нет возможности сделать демонсет?
  - level: Medium
    q: безопасно ли использовать secrets / чем отличается от ConfigMap
    keys:
    - знает про base64 КОДИРОВАНИЕ
    - знает что секреты не шифруются в етцд по-умолчанию
    - понимает что в целом мы все равно и ключ и секрет храним на диске внутри кластера
  - level: Medium
    q: requests limits / Опиши процесс выставления для нового приложения
    keys:
    - знает про то что это такое (в каких цифрах выставляются) и что будет если не выставить
    - знает что превысить лимит по камню нельзя, а по памяти - придет оом
    - знает как замониторить приложение и выставить реквесты и лимиты
  - level: Medium
    q: ливнес, рединес пробы. Как распределяется трафик
    keys:
    - знает что это за пробы
    - знает что происходит когда проба срабатывает
    - знает как распределяется трафик между репликами при сработке проб
  - level: Medium
    q: способы публикации сервиса вовне кластера
    keys:
    - знает про ингресс (+ как публиковать сам ингресс)
    - знает про external ip, nodeport (как трафик долетает)
    - знает про loadbalancer и как он создается в облаке
  Docker:
  - level: High
    q: как трафик доставляется до процесса в контейнере
    keys:
    - знает про bridge docker0, знает про network=host
    - знает что каждый контейнер имеет veth интерфейс со своим ip
    - знает что iptables выполняет NAT со внешнего интерфейса на veth
  - level: Medium
    q: как выполнить динамически изменяемый Dockerfile / например изменять параметры в RUN во время сборки
    keys:
    - знает про ARG
    - может привести пример когда это пригодится
  - level: Medium
    q: Рекомендации при сборке докер образа
    keys:
    - знает про многослойность, дает рекомендации, например, объединять RUN
    - рассказывает про multistage, вычистку кешей
    - знает про alpine,slim,rootless,scratch
  - level: Low
    q: из каких компонент состоит docker
    keys:
    - знает про namespaces, может про них рассказать
    - знает про cgroups, может про них рассказать
    - знает про docker daemon
  - level: Medium
    q: как настроить проверку жизнеспособности контейнера и действия в случае чего
    keys:
    - знает про механизм встроенного хелсчека
    - предлагает вариант с сайдкар хелсчеками
    - предлагает вариант с запуском через демона, который будет следить за процессом сам
  - level: Low
    q: CMD / Entrypoint
    keys:
    - знает что такое CMD
    - знает что такое entrypoint
    - знает, как они связаны друг с другом
  CI/CD:
  - level: Low
    q: Какие бывают стейджи stages / Из чего состоит типовой pipeline
    keys:
    - build test deploy
    - sast
  - level: High
    q: опиши процесс разработки, сборки, выкатки и доставки продукта
    keys:
    - рассказывает про гитфлоу
    - предлагает автосоздание фича-стендов
  - level: Medium
    q: как принести секрет в пайп? какие есть варианты кроме встроенного хранилища
    keys: []
  Postgresql:
  - level: Low
    q: Какие базы данных бывают SQL NoSQL NewSQL можешь привести примеры. чем отличаются
    keys:
    - знает что такое реляционные базы данных и NoSQL
    - может привести примеры баз данных
  - level: Medium
    q: Если бы ты строил отказоустойчивую базу Postgres как бы ты это делал
    keys:
    - Знает что такое RAFT и протокол консенсуса и что etcd/consul >= 3
    - DCS на consul или etcd, несколько экземпляров postgres
    - что такое синхронная и асинхронная репликация
  - level: High
    q: Point in time recovery PITR с patroni / recovery signal / timeline / pgrewind
    keys:
    - pgbackrest, wal-g, wal-e, barman
  Git:
  - level: Low
    q: Для чего нужна система контроля версий
    keys:
    - Совместная разработка и разрешение конфликтов при работе с одним и тем же кодом
  - level: Medium
    q: Разрешение конфликтов merge rebase reset
    keys:
    - Знает отличия rebase от reset
    - Знает как правильно смержить ветки
  - level: High
    q: Если удалить коммит, удалится ли он полностью на удаленном репозитории в gitlab
    keys: []
  Virtualization:
  - level: Low
    q: Отличие виртуализации от контейнеризации и примеры
    keys:
    - Может привести примеры виртуализации и контейнеризации
    - контейнер общее ядро хоста - но более легковесное
    - более высокая степень изоляции но требуется больше ресурсов
  - level: Medium
    q: Виртуализация и паравиртуализация (Xen)
    keys: []
  Nginx:
  - level: Low
    q: Как проверить на валидность конфигурацию
    keys:
    - nginx -t / в разных дистрибутивах возможны /etc/init.d/nginx checkconfig testconfig
  - level: Medium
    q: Какой сигнал заставляет перечитать конфигурацию nginx
    keys:
    - HUP
    - nginx -s reload
  Networking:
  - level: Low
    q: что такое dhcp, как работает
    keys: []
  - level: Medium
    q: как сделать DHCP, развернутый в одном сегменте сети, доступным для других сегментов
    keys: []
  - level: Low
    q: чем отличается tcp от udp
    keys: []
  - level: Low
    q: по какому протоколу работает DNS
    keys: []
  - level: Low
    q: если в системе несколько интерфейсов, как трафик будет ходить в интернет?
    keys: []
  - level: Medium
    q: есть 2 пк соединенных коммутатором, расскажи про ping пкB с пкА
    keys:
    - знает про ARP-запрос, который широковещательно улетит в коммутатор
    - знает что коммутатор производит маклернинг и имеет свою CAM таблицу
    - знает состав icmp пакета на L2,L3
  - level: Medium
    q: расскажи про инструменты, используемые при отладке сетей
    keys: []
  S3:
  - level: Low
    q: какой опыт использования S3, поднимал ли свой minio
    keys: []
  - level: Low
    q: расскажи про процесс создания и доступа к бакету
    keys: []
  - level: Medium
    q: как строить кластерную версию minio, с какими проблемами сталкивался
    keys: []
  - level: High
    q: как пробросить бакет в интернет с авторизацией
    keys: []
  Hashicorp Vault:
  - level: Low
    q: что такое vault и для чего может быть использован
    keys: []
  - level: Medium
    q: в чем смысл хранения секретов в отдельной базе
    keys: []
  - level: Low
    q: как выдать доступ к секрету
    keys: []
  - level: Low
    q: в чем отличие kv v1 от kv v2
    keys: []
  - level: Medium
    q: опыт использования vault как УЦ
    keys: []
  - level: Medium
    q: опыт построения отказоустойчивого Hashicorp Vault
    keys: []
  Openshift:
  - level: Medium
    q: Отличия Openshift от ванильного Kubernetes
    keys:
    - знает что такое DeploymentConfig / BuildConfig / ImageStream / Operators
    - Есть удобная вебпанель по управлению кластером
    - ингресс на основе ha_proxy, встроенный CNI
  Allure:
  - level: High
    q: Из каких компонентов состоит allure и за что каждый из них отвечает
    keys: []
  Clickhouse:
  - level: High
    q: Шардирование, репликация, подключение к PostgreSQL
    keys: []
