# Готовые наборы вопросов (пресеты).
# questions сгруппированы по категории; значения — точные тексты вопросов из questions.yaml.
# build.py сопоставляет их с банком по паре (категория, текст вопроса).
presets:
- id: builtin-base
  name: Базовый набор (как в таблице)
  builtin: true
  questions:
    Linux:
    - Что такое systemd и зачем он нужен
    - Какие права на файл бывают
    - Как посмотреть доступные системе ресурсы ЦПУ ОЗУ / Как оценить утилизацию ресурсов
    - опиши порядок загрузки linux
    - опиши процесс добавления места на жесткий диск для виртуальной машины
    - какие сигналы можно слать процессам / отличие SIGKILL / SIGTERM
    - как работают системы типа cloud init / ignition / kickstart
    - контекстное переключение / системные вызовы / организация памяти процесса / планировщик задач
    Helm:
    - структура helm пакета
    - как откатить плохой релиз
    - как связываются друг с другом манифесты
    - как перезапускать поды при изменении конфигурации
    Ansible:
    - Какие виды переменных существуют и их приоритеты
    - структура ансибл роли
    - как в ansible описать 3 разных кластера etcd / как будет выглядеть структура плейбука
    - писал ли свои фильтры или модули для Ansible на python
    Kubernetes:
    - из каких компонент состоит кластер k8s
    - какой тип деплоя нужно использовать чтобы развернуться на всех нодах кластера
    - безопасно ли использовать secrets / чем отличается от ConfigMap
    - requests limits / Опиши процесс выставления для нового приложения
    - ливнес, рединес пробы. Как распределяется трафик
    Docker:
    - как трафик доставляется до процесса в контейнере
    - Рекомендации при сборке докер образа
    - из каких компонент состоит docker
    - CMD / Entrypoint
    CI/CD:
    - опиши процесс разработки, сборки, выкатки и доставки продукта
    Postgresql:
    - Если бы ты строил отказоустойчивую базу Postgres как бы ты это делал
    Networking:
    - чем отличается tcp от udp
    - есть 2 пк соединенных коммутатором, расскажи про ping пкB с пкА
